name: super_core
description: >
  Super Core — the shared GeniusLink design-system foundation for the Super
  toolkit (super_auto_suggestion_box, super_form_field, super_map,
  super_table_field, super_tree, super_tab_bar). Ships the single source of
  truth for the visual identity: SuperPalette (six swappable color palettes),
  SuperMaterialThemeData (complete Material 3 ThemeData generator), brand +
  semantic colors, the three-face type ramp, the 4px spacing scale, control +
  field sizes, radii, motion, the swappable light/dark SuperThemeData
  ThemeExtension, intl-free formatters, and the design-system widgets (section
  card / header, status pill, button, hairline, field shell, plus SuperCard,
  SuperDialog, SuperSnackBar and SuperAppBar). Light/dark +
  LTR/RTL.

  



version: 1.2.0
homepage: https://geniussystems24.github.io/super_core
repository: https://github.com/GeniusSystems24/super_core
issue_tracker: https://github.com/GeniusSystems24/super_core/issues

topics:
  - flutter
  - widgets
  - design-system
  - theme
  - tokens

environment:
  # v1.1.0 makes SuperMaterialThemeData a ThemeData subclass. That relies on the
  # Material 3 component-theme *Data types (CardThemeData, DialogThemeData,
  # DataTableThemeData, TabBarThemeData) and Color.withValues, so the minimum
  # Flutter is raised to 3.32. The theme code targets the ~3.32–3.33 ThemeData
  # API surface: the component *Data types (CardThemeData/DialogThemeData/
  # DataTableThemeData/TabBarThemeData) are the ThemeData field types, while
  # appBarTheme is still AppBarTheme and inputDecorationTheme is still
  # InputDecorationTheme.
  sdk: ">=3.8.0 <4.0.0"
  flutter: ">=3.32.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  # Drop brand .ttf files under assets/fonts/ to match the design system exactly.
  # Families: Manrope (display) · Inter (body) · JetBrainsMono (mono) · NotoNaskhArabic
  #
  # fonts:
  #   - family: Manrope
  #     fonts:
  #       - asset: assets/fonts/Manrope-Regular.ttf
  #       - asset: assets/fonts/Manrope-Bold.ttf
  #         weight: 700
  #   - family: Inter
  #     fonts:
  #       - asset: assets/fonts/Inter-Regular.ttf
  #       - asset: assets/fonts/Inter-Medium.ttf
  #         weight: 500
  #       - asset: assets/fonts/Inter-SemiBold.ttf
  #         weight: 600
  #       - asset: assets/fonts/Inter-Bold.ttf
  #         weight: 700
  #   - family: JetBrainsMono
  #     fonts:
  #       - asset: assets/fonts/JetBrainsMono-Regular.ttf
  #   - family: NotoNaskhArabic
  #     fonts:
  #       - asset: assets/fonts/NotoNaskhArabic-Regular.ttf
