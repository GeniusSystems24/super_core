name: super_core
description: >
  Super Core — the shared GeniusLink design-system foundation for the Super
  toolkit (super_auto_suggestion_box, super_form_field, super_map,
  super_table_field, super_tree). Ships the single source of truth for the
  visual identity: brand + semantic colors, the three-face type ramp, the 4px
  spacing scale, control + field sizes, radii, motion, the swappable
  light/dark `SuperThemeData` ThemeExtension, intl-free formatters, and the
  design-system widgets (section card / header, status pill, button, hairline,
  field shell). Every Super package depends on this one so they all read as a
  single identity. Light/dark + LTR/RTL.
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  # Drop brand .ttf files under assets/fonts/ to match the design system exactly.
  # Families: Manrope (display) · Inter (body) · JetBrainsMono (mono) · NotoNaskhArabic
