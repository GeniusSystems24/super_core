name: super_core_example
description: >
  Example application demonstrating SuperPalette, SuperMaterialThemeData,
  live palette switching and light/dark mode switching for the super_core package.
publish_to: 'none'
version: 1.0.0

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter
  super_core:
    path: ../

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
